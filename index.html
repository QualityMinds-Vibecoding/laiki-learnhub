<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnHub — QualityMinds</title>
  <meta name="description" content="Geteilte Lernressourcen von QualityMinds-Consultants, aggregiert von LAiKi." />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen antialiased" style="background:#f5f7f4;color:#1a1f16">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="bg-white sticky top-0 z-20" style="border-bottom:1px solid #e0e6db">
    <div class="max-w-3xl mx-auto px-4 sm:px-6">

      <div class="flex items-center justify-between py-4">
        <div class="flex items-center gap-2.5">
          <!-- dot logo -->
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <circle cx="9" cy="9" r="9" fill="#6aaa3a" opacity="0.18"/>
            <circle cx="9" cy="9" r="4.5" fill="#6aaa3a"/>
          </svg>
          <span class="font-semibold text-gray-900 tracking-tight">LearnHub</span>
          <span class="hidden sm:inline text-sm select-none" style="color:#c4c9c1">·</span>
          <span class="hidden sm:inline text-sm" style="color:#8a9484">QualityMinds</span>
        </div>
        <div id="hd-meta" class="text-xs text-right tabular-nums leading-relaxed" style="color:#adb5a6"></div>
      </div>

      <!-- tabs -->
      <div class="flex -mb-px">
        <button id="tab-topics" onclick="window.lhTab('topics')"
          class="px-4 py-2.5 text-sm border-b-2 transition-colors duration-100 focus:outline-none">
          Themen
        </button>
        <button id="tab-resources" onclick="window.lhTab('resources')"
          class="px-4 py-2.5 text-sm border-b-2 transition-colors duration-100 focus:outline-none">
          Ressourcen
        </button>
      </div>
    </div>
  </header>

  <!-- ── Content ────────────────────────────────────────────────────────── -->
  <main id="content" class="max-w-3xl mx-auto px-4 sm:px-6 py-6">
    <p class="text-center py-24 text-sm" style="color:#adb5a6">Lade …</p>
  </main>

  <script>
  (() => {
    'use strict';

    const QM = '#6aaa3a';
    let hub   = { generated_at: null, topics: [] };
    let tab   = 'topics';
    const open = new Set();   // expanded topic ids

    // ── Boot ──────────────────────────────────────────────────────────────
    async function init() {
      if (location.protocol === 'file:') {
        show(fault(
          'Dashboard läuft lokal',
          'Fetch ist über <code style="background:#f3f4f6;padding:1px 5px;border-radius:3px">file://</code> nicht verfügbar.<br>' +
          'Bitte über GitHub Pages öffnen oder lokal starten:<br>' +
          '<code style="background:#f3f4f6;padding:1px 5px;border-radius:3px;margin-top:6px;display:inline-block">npx serve .</code>'
        ));
        return;
      }
      try {
        const r = await fetch('aggregated/learnhub.json');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        hub = await r.json();
        updateMeta();
        render();
      } catch (e) {
        show(fault('Fehler beim Laden', esc(e.message)));
      }
    }

    function updateMeta() {
      const total = hub.topics.reduce((s, t) => s + (t.resource_count || 0), 0);
      const d = hub.generated_at
        ? new Date(hub.generated_at).toLocaleDateString('de-DE')
        : '';
      document.getElementById('hd-meta').innerHTML =
        `${hub.topics.length} Themen · ${total} Ressourcen` +
        (d ? `<br>Stand ${d}` : '');
    }

    // ── Routing ───────────────────────────────────────────────────────────
    function render() {
      updateTabStyles();
      tab === 'topics' ? topicsView() : resourcesView();
    }

    function updateTabStyles() {
      ['topics', 'resources'].forEach(id => {
        const b = document.getElementById('tab-' + id);
        const on = id === tab;
        b.style.borderBottomColor = on ? QM : 'transparent';
        b.style.color              = on ? QM : '#8a9484';
        b.style.fontWeight         = on ? '600' : '400';
      });
    }

    window.lhTab = t => { tab = t; render(); };

    // ── Topics view ───────────────────────────────────────────────────────
    function topicsView() {
      if (!hub.topics.length) { show(emptyState()); return; }
      const sorted = [...hub.topics].sort((a, b) => b.head_count - a.head_count);
      show(`<div class="space-y-2">${sorted.map(topicCard).join('')}</div>`);
      open.forEach(id => applyOpen(id));   // restore expanded state
    }

    function topicCard(t) {
      return `
<div class="bg-white rounded overflow-hidden" style="border:1px solid #e0e6db">
  <button onclick="window.lhToggle('${esc(t.id)}')"
    class="w-full text-left px-5 py-4 hover:bg-gray-50 transition-colors focus:outline-none">
    <div class="flex items-start justify-between gap-4">
      <div class="flex-1 min-w-0">
        <div class="flex items-baseline gap-2 flex-wrap">
          <span class="font-semibold text-gray-900">${esc(t.name)}</span>
          <span class="text-xs tabular-nums" style="color:#adb5a6">
            ${t.resource_count} Ressource${t.resource_count !== 1 ? 'n' : ''}
          </span>
        </div>
        <p class="text-sm mt-0.5" style="color:#8a9484">${headsText(t.head_count)}</p>
      </div>
      <div class="flex items-center gap-3 flex-shrink-0 pt-0.5">
        ${sparkSvg(t.timeline)}
        <svg id="ch-${esc(t.id)}" class="w-4 h-4 flex-shrink-0"
          style="color:#c4c9c1;transition:transform 0.15s ease"
          fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
        </svg>
      </div>
    </div>
  </button>
  <div id="panel-${esc(t.id)}" class="hidden divide-y divide-gray-100"
    style="border-top:1px solid #e0e6db;background:#f9fbf8">
    ${t.resources.length
      ? [...t.resources]
          .sort((a, b) => b.approval_count - a.approval_count)
          .map(r => resRow(r, null))
          .join('')
      : `<p class="px-5 py-4 text-sm" style="color:#adb5a6">Keine Ressourcen.</p>`}
  </div>
</div>`;
    }

    function applyOpen(id) {
      const p = document.getElementById('panel-' + id);
      const c = document.getElementById('ch-' + id);
      if (p) p.classList.remove('hidden');
      if (c) c.style.transform = 'rotate(180deg)';
    }

    window.lhToggle = id => {
      const p = document.getElementById('panel-' + id);
      const c = document.getElementById('ch-' + id);
      if (!p) return;
      if (open.has(id)) {
        open.delete(id);
        p.classList.add('hidden');
        if (c) c.style.transform = '';
      } else {
        open.add(id);
        applyOpen(id);
      }
    };

    // ── Resources view ────────────────────────────────────────────────────
    function resourcesView() {
      const all = hub.topics.flatMap(t => t.resources.map(r => ({ ...r, _t: t.name })));
      if (!all.length) { show(emptyState()); return; }
      all.sort((a, b) => b.approval_count - a.approval_count);
      show(`
<div class="bg-white rounded divide-y divide-gray-100" style="border:1px solid #e0e6db">
  ${all.map(r => resRow(r, r._t)).join('')}
</div>`);
    }

    // ── Shared resource row ───────────────────────────────────────────────
    function resRow(r, topicName) {
      return `
<div class="px-5 py-3.5 flex items-start gap-4 justify-between">
  <div class="flex-1 min-w-0">
    <a href="${esc(r.url)}" target="_blank" rel="noopener noreferrer"
      class="text-sm font-medium text-gray-900 hover:underline block truncate"
      title="${esc(r.title)}">${esc(r.title)}</a>
    <div class="flex items-center gap-1.5 mt-1.5 flex-wrap">
      ${topicName
        ? `<span class="text-xs px-1.5 py-0.5 rounded font-medium text-white"
             style="background:${QM}">${esc(topicName)}</span>`
        : ''}
      ${typeBadge(r.type)}
      <span class="text-xs px-1.5 py-0.5 rounded font-medium bg-gray-100 text-gray-500">
        ${esc(r.language || 'en')}
      </span>
    </div>
  </div>
  <div class="text-right flex-shrink-0 pt-0.5">
    <span class="text-sm font-semibold tabular-nums" style="color:${QM}">${r.approval_count}×</span>
    <p class="text-xs" style="color:#adb5a6">empfohlen</p>
  </div>
</div>`;
    }

    // ── Sparkline ─────────────────────────────────────────────────────────
    function sparkSvg(timeline) {
      if (!timeline || !timeline.length)
        return `<div style="width:72px;height:28px"></div>`;
      const d  = timeline.slice(-6);
      const mx = Math.max(...d.map(x => x.heads), 1);
      const W  = 72, H = 28, gap = 2;
      const bw = (W - gap * (d.length - 1)) / d.length;
      const bars = d.map((p, i) => {
        const h  = Math.max((p.heads / mx) * H, 2);
        const x  = (i * (bw + gap)).toFixed(1);
        const y  = (H - h).toFixed(1);
        // fade oldest→newest: opacity 0.25 to 1.0
        const op = (0.25 + 0.75 * (i / Math.max(d.length - 1, 1))).toFixed(2);
        return `<rect x="${x}" y="${y}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="1.5" fill="${QM}" opacity="${op}"/>`;
      }).join('');
      return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" aria-hidden="true">${bars}</svg>`;
    }

    // ── Helpers ───────────────────────────────────────────────────────────
    function headsText(n) {
      if (n === 0) return 'Noch keine aktuellen Lernenden';
      return n === 1
        ? '1 Person beschäftigt sich gerade damit'
        : `${n} Personen beschäftigen sich gerade damit`;
    }

    const BADGE_COLORS = {
      article: ['#dbeafe', '#1d4ed8'],
      video:   ['#fee2e2', '#b91c1c'],
      podcast: ['#f3e8ff', '#7e22ce'],
      course:  ['#ffedd5', '#c2410c'],
      tool:    ['#cffafe', '#0e7490'],
      book:    ['#e0e7ff', '#3730a3'],
    };
    function typeBadge(type) {
      const [bg, fg] = BADGE_COLORS[type] || ['#f3f4f6', '#4b5563'];
      return `<span class="text-xs px-1.5 py-0.5 rounded font-medium"
        style="background:${bg};color:${fg}">${esc(type || '—')}</span>`;
    }

    function emptyState() {
      return `
<div class="text-center py-20">
  <div class="text-5xl mb-4">📚</div>
  <p class="font-medium text-gray-600">Noch keine Lernmaterialien geteilt.</p>
  <p class="text-sm mt-2 max-w-xs mx-auto" style="color:#8a9484">
    LAiKi-Nutzer teilen ihre ersten Ressourcen, sobald sie loslegen.
  </p>
</div>`;
    }

    function fault(title, detail) {
      return `
<div class="max-w-sm mx-auto text-center py-20">
  <div class="text-4xl mb-4">⚠️</div>
  <p class="font-semibold text-gray-700">${title}</p>
  <p class="text-sm mt-2 leading-relaxed" style="color:#6b7280">${detail}</p>
</div>`;
    }

    function show(html) { document.getElementById('content').innerHTML = html; }

    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    init();
  })();
  </script>
</body>
</html>
